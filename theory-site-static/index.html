<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Between Potential and Ideal — Nihilism with Hope in an Uncertain World. A metaphysical theory by Barak Ben Hur." />
    <meta property="og:title" content="Between Potential and Ideal" />
    <meta property="og:description" content="Nihilism with Hope in an Uncertain World — a metaphysical theory by Barak Ben Hur." />
    <meta property="og:type" content="website" />
    <title>Between Potential and Ideal · Barak Ben Hur</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app" class="site-shell" dir="rtl">
      <section class="hero">
        <div class="hero-bg"></div>
        <div class="topbar container">
          <div class="brand">
            <div class="brand-mark">≋</div>
            <div>
              <p id="authorTop">ברק בן חור</p>
              <strong id="brandTitle">בין הפוטנציאל לאידיאל</strong>
            </div>
          </div>
          <button class="lang-button" id="langButton" type="button">◎ English</button>
        </div>

        <div class="container hero-grid">
          <div class="hero-copy">
            <div class="pills">
              <span class="pill" id="eyebrow">תיאוריה מטאפיזית לפרסום ולדיון</span>
              <span class="pill" id="subtitle">ניהיליזם עם תקווה בעולם לא ודאי</span>
            </div>
            <h1 id="title">בין הפוטנציאל לאידיאל</h1>
            <p class="intro" id="intro"></p>
            <div class="actions">
              <a href="#theory" class="primary" id="primaryCta">☰ קרא את התיאוריה</a>
              <a href="mailto:barakbenhur@gmail.com" class="secondary" id="secondaryCta">✉ פתח דיון</a>
            </div>
          </div>

          <div class="orb" aria-label="Theory core quote">
            <div class="ring ring-one"></div>
            <div class="ring ring-two"></div>
            <div class="cross vertical"></div>
            <div class="cross horizontal"></div>
            <div class="quote-card">
              <div class="spark">✦</div>
              <blockquote id="coreQuote"></blockquote>
            </div>
          </div>
        </div>
      </section>

      <section id="theory" class="content-section container">
        <div class="section-heading">
          <p class="kicker" id="essayKicker">המאמר</p>
          <h2 id="essayTitle">גרסה קצרה, חזקה וברורה</h2>
        </div>
        <div class="card-grid" id="cardGrid"></div>
      </section>

      <section class="motifs-wrap">
        <div class="motifs container">
          <div>
            <p class="kicker" id="motifsKicker">מפת רעיון</p>
            <h2 id="motifsTitle">המוטיבים של התיאוריה</h2>
          </div>
          <div class="motif-grid" id="motifGrid"></div>
        </div>
      </section>

      <section class="cta-section container">
        <div>
          <h2 id="publishTitle"></h2>
          <p id="publishText"></p>
        </div>
        <a href="mailto:barakbenhur@gmail.com" class="email-button" id="emailCta">✉ שלח תגובה</a>
      </section>

      <footer id="footerText"></footer>
    </main>
    <script src="script.js"></script>
  </body>
</html>
